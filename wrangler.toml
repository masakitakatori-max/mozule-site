name = "mozule-site"
main = "src/worker.js"
compatibility_date = "2024-04-03"
workers_dev = false

[vars]
ADMIN_ALLOWED_EMAILS = "masaki.takatori@mozule.co.jp"
CONTACT_FROM_EMAIL = "noreply@mozule.co.jp"
CONTACT_TO = "masaki.takatori@mozule.co.jp"
GITHUB_REPO = "masakitakatori-max/mozule-site"
GITHUB_BASE_BRANCH = "master"

[[routes]]
pattern = "mozule.co.jp/*"
zone_name = "mozule.co.jp"

[[send_email]]
name = "CONTACT_EMAIL"
allowed_destination_addresses = ["masaki.takatori@mozule.co.jp"]
allowed_sender_addresses = ["noreply@mozule.co.jp"]

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
